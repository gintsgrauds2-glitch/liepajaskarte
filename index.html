<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">

    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>

        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[56.501687006237724,20.989102760454678],[56.5099732247722,21.018295190571436]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    var img = popup._contentNode.querySelector('td img');
                    if (img) {
                        // If already loaded (cache), update immediately
                        if (img.complete && img.naturalHeight > 0) {
                            popup.update();
                        } else {
                            img.addEventListener('load', function() {
                                popup.update();
                            });
                            img.addEventListener('error', function() {
                                popup.update();
                            });
                        }
                    }
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_OpenTopoMap_0');
        map.getPane('pane_OpenTopoMap_0').style.zIndex = 400;
        var layer_OpenTopoMap_0 = L.tileLayer('https://a.tile.opentopomap.org/{z}/{x}/{y}.png', {
            pane: 'pane_OpenTopoMap_0',
            opacity: 1.0,
            attribution: '<a href="https://www.openstreetmap.org/copyright">Kartendaten: © OpenStreetMap-Mitwirkende, SRTM | Kartendarstellung: © OpenTopoMap (CC-BY-SA)</a>',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 18
        });
        layer_OpenTopoMap_0;
        map.addLayer(layer_OpenTopoMap_0);
        map.createPane('pane_GoogleSatelits_1');
        map.getPane('pane_GoogleSatelits_1').style.zIndex = 401;
        var layer_GoogleSatelits_1 = L.tileLayer('[https://mt1.google.com/vt/lyrs=s&x=](https://mt1.google.com/vt/lyrs=s&x=){x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatelits_1',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 18
        });
        layer_GoogleSatelits_1;
        map.addLayer(layer_GoogleSatelits_1);
        function pop_Jrmala_2(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['fid'] !== null ? autolinker.link(String(feature.properties['fid']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['Objekts'] !== null ? autolinker.link(String(feature.properties['Objekts']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['Uzdevums'] !== null ? autolinker.link(String(feature.properties['Uzdevums']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['Status'] !== null ? autolinker.link(String(feature.properties['Status']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Jrmala_2_0(feature) {
            switch(String(feature.properties['Objekts'])) {
                case '1':
                    return {
                pane: 'pane_Jrmala_2',
                opacity: 1,
                color: 'rgba(35,35,35,0.462)',
                dashArray: '5.0,1.0',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(127,141,230,0.462)',
                interactive: true,
            }
                    break;
                case 'Ilona Sapjorova':
                    return {

                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(231,218,131,0.462)',
                interactive: true,
            }
                    break;
                case 'test':
                    return {
                pane: 'pane_Jrmala_2',
                opacity: 1,
                color: 'rgba(35,35,35,0.462)',
                dashArray: '5.0,1.0',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(14,239,100,0.462)',
                interactive: true,
            }
                    break;
                default:
                    return {
                pane: 'pane_Jrmala_2',
                opacity: 1,
                color: 'rgba(35,35,35,0.462)',
                dashArray: '5.0,1.0',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(223,115,184,0.462)',
                interactive: true,
            }
                    break;
                case 'Anna Sergina-Vetaškova':
                    return {
                pane: 'pane_Jrmala_2',
                opacity: 1,
                color: 'rgba(35,35,35,0.462)',
                dashArray: '5.0,1.0',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(51,160,44,0.462)',
                interactive: true,
            }
                    break;
                case 'Irina Steļmahova':
                    return {
                pane: 'pane_Jrmala_2',
                opacity: 1,
                color: 'rgba(35,35,35,0.462)',
                dashArray: '5.0,1.0',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(36,189,254,0.462)',
                interactive: true,
            }
                    break;
                case 'Alisa Gurkova':
                    return {
                pane: 'pane_Jrmala_2',
                opacity: 1,
                color: 'rgba(35,35,35,0.462)',
                dashArray: '5.0,1.0',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(227,26,28,0.462)',
                interactive: true,
            }
                    break;
            }
        }
        map.createPane('pane_Jrmala_2');
        map.getPane('pane_Jrmala_2').style.zIndex = 402;
        map.getPane('pane_Jrmala_2').style['mix-blend-mode'] = 'normal';
        var layer_Jrmala_2 = new L.geoJson(json_Jrmala_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Jrmala_2',
            layerName: 'layer_Jrmala_2',
            pane: 'pane_Jrmala_2',
            onEachFeature: pop_Jrmala_2,
            style: style_Jrmala_2_0,
        });
        bounds_group.addLayer(layer_Jrmala_2);
        map.addLayer(layer_Jrmala_2);
        setBounds();
        </script>
    </body>
</html>
